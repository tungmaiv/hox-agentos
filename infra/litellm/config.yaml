model_list:
  # Primary models — local Ollama (fast, private, no egress cost)
  # think: false disables qwen3.5 reasoning tokens (6x faster, ~1.4s vs ~9s per call)
  # TODO: make thinking mode configurable per-user via preferences API
  - model_name: blitz-master
    litellm_params:
      model: ollama/qwen3.5:cloud
      api_base: http://host.docker.internal:11434
      extra_body:
        think: false

  - model_name: blitz-fast
    litellm_params:
      model: ollama/qwen3.5:cloud
      api_base: http://host.docker.internal:11434
      extra_body:
        think: false

  - model_name: blitz-coder
    litellm_params:
      model: ollama/qwen3.5:cloud
      api_base: http://host.docker.internal:11434
      extra_body:
        think: false

  - model_name: blitz-summarizer
    litellm_params:
      model: ollama/qwen3.5:cloud
      api_base: http://host.docker.internal:11434
      extra_body:
        think: false

  # Cloud fallback — free OpenRouter model, used when Ollama is unavailable.
  # Prefixed with "fb-" to avoid name collisions with primary entries.
  - model_name: fb-openrouter-free
    litellm_params:
      model: openrouter/arcee-ai/trinity-large-preview:free
      api_key: os.environ/OPENROUTER_API_KEY

router_settings:
  # If the primary Ollama model fails (connection error, timeout), route to
  # the cloud fallback. Keeps the system available during Ollama restarts
  # or when the host GPU is busy.
  fallbacks:
    - {"blitz-master": ["fb-openrouter-free"]}
    - {"blitz-fast": ["fb-openrouter-free"]}
    - {"blitz-coder": ["fb-openrouter-free"]}
    - {"blitz-summarizer": ["fb-openrouter-free"]}

litellm_settings:
  drop_params: true
  callbacks: ["prometheus"]

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
