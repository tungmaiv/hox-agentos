# Override for local dev — two modes:
#
#   Mode 1 — Hybrid (backend/frontend on HOST, infra in Docker):
#     docker compose -f docker-compose.yml -f docker-compose.local.yml up -d \
#       postgres redis litellm mcp-crm telegram-gateway
#     just backend    # uvicorn on host with --reload
#     just frontend   # pnpm dev on host with HMR
#
#   Mode 2 — Full Docker with hot reload (no rebuilds on code change):
#     just dev-local
#     Backend: --reload watches source dirs; .venv stays from image (never overwritten)
#     Frontend: pnpm dev with ./frontend mounted, HMR on save
#
# Gateways reach backend via Docker service name in both modes.

services:
  # ── Backend: mount source dirs only — .venv untouched in image ──
  # Mounting ./backend:/app would overwrite .venv; instead mount each
  # source directory individually so the image .venv is preserved.
  backend:
    command: .venv/bin/uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./logs:/app/logs
      - ./backend/main.py:/app/main.py
      - ./backend/workflow_events.py:/app/workflow_events.py
      - ./backend/agents:/app/agents
      - ./backend/api:/app/api
      - ./backend/channels:/app/channels
      - ./backend/core:/app/core
      - ./backend/gateway:/app/gateway
      - ./backend/mcp:/app/mcp
      - ./backend/memory:/app/memory
      - ./backend/prompts:/app/prompts
      - ./backend/sandbox:/app/sandbox
      - ./backend/scheduler:/app/scheduler
      - ./backend/security:/app/security
      - ./backend/skills:/app/skills
      - ./backend/skill_export:/app/skill_export
      - ./backend/skill_repos:/app/skill_repos
      - /var/run/docker.sock:/var/run/docker.sock  # sandbox executor needs Docker
      - ./frontend/certs:/app/certs:ro  # Keycloak CA cert for TLS verification
    environment:
      # Override host paths/URLs from backend/.env with Docker-network equivalents
      KEYCLOAK_URL: https://keycloak.blitz.local:7443
      KEYCLOAK_CA_CERT: /app/certs/keycloak.crt
      KEYCLOAK_CLIENT_ID: blitz-backend
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-blitz-portal-secret-dev}
      KEYCLOAK_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USERNAME:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-8f7d6e5c4b3a29180f7d6e5c4b3a2918}
      ENVIRONMENT: development
      TELEGRAM_GATEWAY_URL: http://telegram-gateway:9001
      WHATSAPP_GATEWAY_URL: http://whatsapp-gateway:9002
      TEAMS_GATEWAY_URL: http://teams-gateway:9003
    extra_hosts:
      - "keycloak.blitz.local:172.16.155.115"  # remote Keycloak server

  # ── Frontend: dev mode with HMR ─────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend:/app       # live source — HMR via pnpm dev
      - /app/node_modules     # anonymous vol: protects installed node_modules
    env_file:
      - .env
    environment:
      # Override wrong KEYCLOAK_CLIENT_ID from root .env (blitz-agentos → blitz-portal)
      # Root .env injects as process env vars which override .env.local in Next.js
      KEYCLOAK_CLIENT_ID: blitz-portal
      # NOT ${KEYCLOAK_CLIENT_SECRET} — docker-compose resolves that from root .env which holds
      # the blitz-backend secret (yKIMRhwQCEJPMJ5SFPCON5XzelpxLRMc), wrong for blitz-portal.
      # Use a separate var so it can be overridden without touching the backend secret.
      KEYCLOAK_CLIENT_SECRET: ${FRONTEND_KEYCLOAK_CLIENT_SECRET:-blitz-portal-secret-dev}
      KEYCLOAK_ISSUER: https://keycloak.blitz.local:7443/realms/blitz-internal
      # Backend URL for server-side fetches (route.ts proxy) — localhost doesn't exist in container
      NEXT_PUBLIC_API_URL: http://backend:8000
    extra_hosts:
      - "keycloak.blitz.local:172.16.155.115"  # remote Keycloak server

  # ── Celery workers: mount source so code changes don't need rebuild ──
  # Workers don't hot-reload (no --autoreload); restart to pick up changes:
  #   docker compose -f docker-compose.yml -f docker-compose.local.yml restart celery-worker celery-worker-default
  celery-worker:
    volumes:
      - ./logs:/app/logs
      - ./backend/agents:/app/agents
      - ./backend/api:/app/api
      - ./backend/channels:/app/channels
      - ./backend/core:/app/core
      - ./backend/gateway:/app/gateway
      - ./backend/memory:/app/memory
      - ./backend/mcp:/app/mcp
      - ./backend/prompts:/app/prompts
      - ./backend/sandbox:/app/sandbox
      - ./backend/scheduler:/app/scheduler
      - ./backend/security:/app/security
      - ./backend/skills:/app/skills
      - ./backend/skill_export:/app/skill_export
      - ./backend/skill_repos:/app/skill_repos

  celery-worker-default:
    volumes:
      - ./logs:/app/logs
      - ./backend/agents:/app/agents
      - ./backend/api:/app/api
      - ./backend/channels:/app/channels
      - ./backend/core:/app/core
      - ./backend/gateway:/app/gateway
      - ./backend/memory:/app/memory
      - ./backend/mcp:/app/mcp
      - ./backend/prompts:/app/prompts
      - ./backend/sandbox:/app/sandbox
      - ./backend/scheduler:/app/scheduler
      - ./backend/security:/app/security
      - ./backend/skills:/app/skills
      - ./backend/skill_export:/app/skill_export
      - ./backend/skill_repos:/app/skill_repos

  # ── Gateways: reach backend via Docker service name ──────────
  telegram-gateway:
    depends_on: {}
    environment:
      BACKEND_URL: http://backend:8000
    extra_hosts:
      - "host.docker.internal:host-gateway"

  whatsapp-gateway:
    depends_on: {}
    environment:
      BACKEND_URL: http://backend:8000
    extra_hosts:
      - "host.docker.internal:host-gateway"

  teams-gateway:
    depends_on: {}
    environment:
      BACKEND_URL: http://backend:8000
    extra_hosts:
      - "host.docker.internal:host-gateway"
