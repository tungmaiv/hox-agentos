services:
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: blitz
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: blitz
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blitz -d blitz"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - blitz-net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - blitz-net

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_started
    volumes:
      - ./infra/litellm/config.yaml:/app/config.yaml
    command: --config /app/config.yaml --port 4000
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_KEY}
      OPENAI_API_KEY: ${OPENAI_KEY}
      OPENROUTER_API_KEY: ${OPENROUTER_KEY}
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - blitz-net

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      litellm:
        condition: service_started
    env_file:
      - .env
    command: .venv/bin/uvicorn main:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    volumes:
      - ./logs:/app/logs
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - blitz-net

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_started
    networks:
      - blitz-net

  mcp-crm:
    build: ./infra/mcp-crm
    ports:
      - "8001:8001"
    restart: unless-stopped
    networks:
      - blitz-net

  celery-worker:
    build: ./backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      litellm:
        condition: service_started
    env_file:
      - .env
    command: .venv/bin/celery -A scheduler.celery_app worker -Q embedding --concurrency=2 -l info
    volumes:
      - ./logs:/app/logs
    extra_hosts:
      - "host.docker.internal:host-gateway"  # needed for Ollama access (blitz/summarizer)
    networks:
      - blitz-net

  celery-worker-default:
    build: ./backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      litellm:
        condition: service_started
    env_file:
      - .env
    command: .venv/bin/celery -A scheduler.celery_app worker -Q default --concurrency=4 -l info
    volumes:
      - ./logs:/app/logs
    extra_hosts:
      - "host.docker.internal:host-gateway"  # needed for Ollama access (blitz/summarizer)
    networks:
      - blitz-net

  # Channel sidecar — WhatsApp
  whatsapp-gateway:
    build: ./channel-gateways/whatsapp
    ports:
      - "9002:9002"
    environment:
      WHATSAPP_ACCESS_TOKEN: ${WHATSAPP_ACCESS_TOKEN}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID}
      WHATSAPP_VERIFY_TOKEN: ${WHATSAPP_VERIFY_TOKEN}
      BACKEND_URL: http://backend:8000
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped
    networks:
      - blitz-net

  # Channel sidecar — MS Teams
  teams-gateway:
    build: ./channel-gateways/teams
    ports:
      - "9003:9003"
    environment:
      TEAMS_APP_ID: ${TEAMS_APP_ID}
      TEAMS_APP_PASSWORD: ${TEAMS_APP_PASSWORD}
      BACKEND_URL: http://backend:8000
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped
    networks:
      - blitz-net

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      - redis
      - postgres
    env_file: ./backend/.env
    command: .venv/bin/celery -A scheduler.celery_app beat -l info
    volumes:
      - ./logs:/app/logs
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - blitz-net

volumes:
  postgres_data:

networks:
  blitz-net:
    driver: bridge
