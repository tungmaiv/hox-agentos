services:
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: blitz
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: blitz
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blitz -d blitz"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - blitz-net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - blitz-net

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_started
    volumes:
      - ./infra/litellm/config.yaml:/app/config.yaml
    command: --config /app/config.yaml --port 4000
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_KEY}
      OPENAI_API_KEY: ${OPENAI_KEY}
      OPENROUTER_API_KEY: ${OPENROUTER_KEY}
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - blitz-net

  embedding-sidecar:
    image: michaelf34/infinity:latest
    environment:
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-BAAI/bge-m3}
    volumes:
      - embedding_model_cache:/app/.cache
    ports:
      - "7997:7997"
    command: v2 --model-name-or-path ${EMBEDDING_MODEL:-BAAI/bge-m3} --port 7997
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:7997/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    networks:
      - blitz-net

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      litellm:
        condition: service_started
      mcp-crm:
        condition: service_started
      mcp-timelog:
        condition: service_started
    env_file:
      - .env
    command: .venv/bin/uvicorn main:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    volumes:
      - ./logs:/app/logs
      - /var/run/docker.sock:/var/run/docker.sock:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - blitz-net

  # Channel sidecar — Telegram
  telegram-gateway:
    build: ./channel-gateways/telegram
    ports:
      - "9001:9001"
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_WEBHOOK_URL: ${TELEGRAM_WEBHOOK_URL}
      BACKEND_URL: http://backend:8000
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped
    networks:
      - blitz-net

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_started
    env_file:
      - ./frontend/.env.local
    environment:
      # Override for server-side calls inside Docker (NEXT_PUBLIC_ baked value is localhost:8000 for browser)
      BACKEND_URL: "http://backend:8000"
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
    networks:
      - blitz-net

  mcp-crm:
    build: ./infra/mcp-crm
    ports:
      - "8001:8001"
    restart: unless-stopped
    networks:
      - blitz-net

  mcp-timelog:
    build: ./infra/mcp-timelog
    ports:
      - "8002:8002"
    restart: unless-stopped
    networks:
      - blitz-net

  # Security scanner microservice — runs pip-audit, bandit, detect-secrets
  security-scanner:
    build:
      context: ./infra/security-scanner
      dockerfile: Dockerfile
    ports:
      - "8003:8003"
    environment:
      - DATABASE_URL=${DATABASE_URL}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - blitz-net

  celery-worker:
    build: ./backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      litellm:
        condition: service_started
    env_file:
      - .env
    command: .venv/bin/celery -A scheduler.celery_app worker -Q embedding --concurrency=2 -l info
    volumes:
      - ./logs:/app/logs
    extra_hosts:
      - "host.docker.internal:host-gateway"  # needed for Ollama access (blitz/summarizer)
    networks:
      - blitz-net

  celery-worker-default:
    build: ./backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      litellm:
        condition: service_started
    env_file:
      - .env
    command: .venv/bin/celery -A scheduler.celery_app worker -Q default --concurrency=4 -l info
    volumes:
      - ./logs:/app/logs
    extra_hosts:
      - "host.docker.internal:host-gateway"  # needed for Ollama access (blitz/summarizer)
    networks:
      - blitz-net

  # Channel sidecar — WhatsApp
  whatsapp-gateway:
    build: ./channel-gateways/whatsapp
    ports:
      - "9002:9002"
    environment:
      WHATSAPP_ACCESS_TOKEN: ${WHATSAPP_ACCESS_TOKEN}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID}
      WHATSAPP_VERIFY_TOKEN: ${WHATSAPP_VERIFY_TOKEN}
      BACKEND_URL: http://backend:8000
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped
    networks:
      - blitz-net

  # Channel sidecar — MS Teams
  teams-gateway:
    build: ./channel-gateways/teams
    ports:
      - "9003:9003"
    environment:
      TEAMS_APP_ID: ${TEAMS_APP_ID}
      TEAMS_APP_PASSWORD: ${TEAMS_APP_PASSWORD}
      BACKEND_URL: http://backend:8000
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped
    networks:
      - blitz-net

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      - redis
      - postgres
    env_file: ./backend/.env
    command: .venv/bin/celery -A scheduler.celery_app beat -l info
    volumes:
      - ./logs:/app/logs
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - blitz-net

  # ── Observability Stack ──────────────────────────────────────
  prometheus:
    image: prom/prometheus:v3.2.1
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    restart: unless-stopped
    networks:
      - blitz-net

  grafana:
    image: grafana/grafana:11.4.0
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./infra/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./infra/grafana/dashboards:/etc/grafana/dashboards:ro
      - ./infra/grafana/provisioning/alerting:/etc/grafana/provisioning/alerting:ro
    environment:
      GF_SERVER_ROOT_URL: "http://localhost:3001/"
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_GENERIC_OAUTH_ENABLED: "true"
      GF_AUTH_GENERIC_OAUTH_NAME: "Keycloak"
      GF_AUTH_GENERIC_OAUTH_ALLOW_SIGN_UP: "true"
      GF_AUTH_GENERIC_OAUTH_CLIENT_ID: "grafana"
      GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET: ${GRAFANA_OAUTH_CLIENT_SECRET:-}
      GF_AUTH_GENERIC_OAUTH_SCOPES: "openid email profile roles"
      GF_AUTH_GENERIC_OAUTH_AUTH_URL: "https://keycloak.blitz.local:7443/realms/blitz-internal/protocol/openid-connect/auth"
      GF_AUTH_GENERIC_OAUTH_TOKEN_URL: "https://keycloak.blitz.local:7443/realms/blitz-internal/protocol/openid-connect/token"
      GF_AUTH_GENERIC_OAUTH_API_URL: "https://keycloak.blitz.local:7443/realms/blitz-internal/protocol/openid-connect/userinfo"
      GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_PATH: "contains(realm_roles[*], 'admin') && 'Admin' || contains(realm_roles[*], 'ops') && 'Editor' || 'Viewer'"
      GF_AUTH_GENERIC_OAUTH_TLS_SKIP_VERIFY_INSECURE: "true"
      GF_AUTH_DISABLE_LOGIN_FORM: "false"
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      GRAFANA_ALERT_CHAT_ID: ${GRAFANA_ALERT_CHAT_ID:-}
    extra_hosts:
      - "keycloak.blitz.local:172.16.155.115"
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped
    networks:
      - blitz-net

  loki:
    image: grafana/loki:3.3.2
    volumes:
      - ./infra/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/loki-config.yml
    restart: unless-stopped
    networks:
      - blitz-net

  alloy:
    image: grafana/alloy:v1.6.1
    volumes:
      - ./infra/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: run /etc/alloy/config.alloy
    depends_on:
      - loki
    restart: unless-stopped
    networks:
      - blitz-net

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    # NO ports exposed to host — Keycloak also uses 8080 internally (different DNS, no collision).
    # Prometheus scrapes cadvisor:8080 on blitz-net only.
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    privileged: true
    devices:
      - /dev/kmsg
    restart: unless-stopped
    networks:
      - blitz-net

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
  loki_data:
  embedding_model_cache:

networks:
  blitz-net:
    driver: bridge
